# Tests that different env values get separate cache entries

[[e2e]]
name = "individual cache for env"
steps = [
  { argv = [
    "vt",
    "run",
    "hello",
  ], envs = [
    [
      "FOO",
      "1",
    ],
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "hello",
  ], envs = [
    [
      "FOO",
      "2",
    ],
  ], comment = "cache miss, different env" },
  { argv = [
    "vt",
    "run",
    "hello",
  ], envs = [
    [
      "FOO",
      "1",
    ],
  ], comment = "cache hit" },
  { argv = [
    "vt",
    "run",
    "hello",
  ], envs = [
    [
      "FOO",
      "2",
    ],
  ], comment = "cache hit" },
]
