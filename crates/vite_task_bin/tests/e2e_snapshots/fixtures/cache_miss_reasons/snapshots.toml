[[e2e]]
name = "cwd_changed"
comment = """
Changing the task's `cwd` should invalidate the cache, even if the input file exists at the new location.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  [
    "vtt",
    "mkdir",
    "-p",
    "subfolder",
  ],
  [
    "vtt",
    "cp",
    "test.txt",
    "subfolder/test.txt",
  ],
  { argv = [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "\"cache\": true",
    "\"cache\": true, \"cwd\": \"subfolder\"",
  ], comment = "change cwd" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: cwd changed" },
]

[[e2e]]
name = "inferred_input_changes"
comment = """
Modifying, removing, and re-adding an input file (tracked via fspy inference) should each invalidate the cache.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "test.txt",
    "initial",
    "modified",
  ], comment = "modify input" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: input modified" },
  { argv = [
    "vtt",
    "rm",
    "test.txt",
  ], comment = "remove tracked input" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: input removed" },
  { argv = [
    "vtt",
    "write-file",
    "test.txt",
    "new content",
  ], comment = "recreate previously removed file" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: input added" },
]

