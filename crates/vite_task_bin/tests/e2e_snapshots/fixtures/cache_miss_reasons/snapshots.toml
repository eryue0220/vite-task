[[e2e]]
name = "untracked_env_added"
comment = """
Adding an `untrackedEnv` entry to the task config should invalidate the cache.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "vite-task.json",
    "\"cache\": true",
    "\"cache\": true, \"untrackedEnv\": [\"MY_UNTRACKED\"]",
  ], comment = "add untracked env" },
  { argv = [
    "vt",
    "run",
    "test",
  ], comment = "cache miss: untracked env added" },
]

