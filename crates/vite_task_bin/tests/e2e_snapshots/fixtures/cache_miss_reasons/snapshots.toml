  ], comment = "cache miss: configuration changed" },
]

[[e2e]]
name = "glob_input_changes"
comment = """
Modifying, adding, or removing files matched by a glob `input` pattern should each invalidate the cache.
"""
steps = [
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss" },
  { argv = [
    "vtt",
    "replace-file-content",
    "test.txt",
    "initial",
    "modified",
  ], comment = "modify glob input" },
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss: input modified" },
  { argv = [
    "vtt",
    "write-file",
    "new.txt",
    "new content",
  ], comment = "add a new .txt file" },
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss: input added" },
  { argv = [
    "vtt",
    "rm",
    "extra.txt",
  ], comment = "remove a .txt file" },
  { argv = [
    "vt",
    "run",
    "glob-test",
  ], comment = "cache miss: input removed" },
]
