# Tests that cache: false in task config disables caching

[[e2e]]
name = "task with cache disabled"
steps = [
  { argv = [
    "vt",
    "run",
    "no-cache-task",
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "no-cache-task",
  ], comment = "cache disabled, runs again" },
]

[[e2e]]
name = "task with cache enabled"
steps = [
  { argv = [
    "vt",
    "run",
    "cached-task",
  ], comment = "cache miss" },
  { argv = [
    "vt",
    "run",
    "cached-task",
  ], comment = "cache hit" },
]
